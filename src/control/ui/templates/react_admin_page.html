(function () {
  const API_ROOT = '{{admin_api_root}}';
  const LOGIN_ROOT = '{{login_root}}';
  const TOKEN_STORAGE = 'apiproxy_admin_access_token_v1';
  const LOGGING_TTL_PRESET_SECONDS = Object.freeze({
    '1h': 3600,
    '6h': 21600,
    '24h': 86400,
    '7d': 604800,
  });
  const SANDBOX_REDACT_HEADERS = new Set([
    'authorization',
    'proxy-authorization',
    'cookie',
    'set-cookie',
    'x-proxy-key',
    'x-admin-key',
    'x-issuer-key',
  ]);
  const e = React.createElement;

  const styles = `
    :root {

      --ra-surface: #ffffff;

  const style = document.createElement('style');
  style.textContent = styles;
  document.head.appendChild(style);

  function getToken() {
    try { return sessionStorage.getItem(TOKEN_STORAGE) || ''; } catch { return ''; }
  }

  function clearTokenAndExit() {
    try { sessionStorage.removeItem(TOKEN_STORAGE); } catch {}
    window.location.href = LOGIN_ROOT;
  }

  async function apiJson(path, method = 'GET', body = null) {
    const token = getToken();
    if (!token) return clearTokenAndExit(), null;
    const headers = { authorization: 'Bearer ' + token };
    if (body !== null) headers['content-type'] = 'application/json';
    const res = await fetch(API_ROOT + path, {
      method,
      headers,
      body: body == null ? undefined : JSON.stringify(body),
    });
    if (res.status === 401) return clearTokenAndExit(), null;
    const text = await res.text();
    let payload = null;
    try { payload = JSON.parse(text); } catch {}
    if (!res.ok) throw new Error((payload && payload.error && payload.error.message) || 'Request failed');
    return payload;
  }

  async function apiText(path) {
    const token = getToken();
    if (!token) return clearTokenAndExit(), '';
    const res = await fetch(API_ROOT + path, {
      method: 'GET',
      headers: { authorization: 'Bearer ' + token },
    });
    if (res.status === 401) return clearTokenAndExit(), '';
    if (!res.ok) throw new Error('Request failed');
    return await res.text();
  }

  async function putYaml(path, yamlText) {
    const token = getToken();
    if (!token) return clearTokenAndExit();
    const res = await fetch(API_ROOT + path, {
      method: 'PUT',
      headers: {
        authorization: 'Bearer ' + token,
        'content-type': 'text/yaml',
      },
      body: yamlText,
    });
    if (res.status === 401) return clearTokenAndExit();
    const text = await res.text();
    let payload = null;
    try { payload = JSON.parse(text); } catch {}
    if (!res.ok) throw new Error((payload && payload.error && payload.error.message) || 'Save failed');
    return payload;
  }

  function parseTopLevelYamlValue(yamlText, key) {
    const m = String(yamlText || '').match(new RegExp('^' + key + ':\\s*(.+)$', 'm'));
    if (!m) return '';
    const raw = String(m[1] || '').trim();
    if (!raw || raw.toLowerCase() === 'null') return '';
    if ((raw.startsWith('"') && raw.endsWith('"')) || (raw.startsWith("'") && raw.endsWith("'"))) return raw.slice(1, -1);
    return raw;
  }

  function setTopLevelYamlValue(yamlText, key, value, nullable) {
    const text = String(yamlText || '');
    const v = String(value || '').trim();
    const encoded = !v && nullable ? 'null' : ('"' + v.replace(/"/g, '\\"') + '"');
    const line = key + ': ' + encoded;
    if (new RegExp('^' + key + ':\\s*', 'm').test(text)) {
      return text.replace(new RegExp('^' + key + ':\\s*.*$', 'm'), line);
    }
    return line + '\n' + text;
  }

  function headersObjToText(obj) {
    if (!obj || typeof obj !== 'object') return '';
    return Object.entries(obj).map(([k, v]) => String(k) + ': ' + String(v == null ? '' : v)).join('\n');
  }

  function headersTextToObj(text) {
    const out = {};
    String(text || '').split(/\r?\n/).forEach((line) => {
      const s = line.trim();
      if (!s) return;
      const idx = s.indexOf(':');
      if (idx <= 0) return;
      const key = s.slice(0, idx).trim();
      const val = s.slice(idx + 1).trim();
      if (!key) return;
      out[key] = val;
    });
    return out;
  }

  function textToLines(rawText) {
    return String(rawText || '')
      .split(/\r?\n/)
      .map((line) => line.trim())
      .filter(Boolean);
  }

  function headersObjectToMultiline(obj) {
    if (!obj || typeof obj !== 'object') return '';
    return Object.entries(obj)
      .map(([name, value]) => String(name || '').trim() ? (String(name).trim() + ': ' + String(value ?? '')) : '')
      .filter(Boolean)
      .join('\n');
  }

  function normalizeRuleHeaders(rule) {
    if (!rule || typeof rule !== 'object') return {};
    if (Array.isArray(rule.match_headers ?? rule.headers)) {
      const out = {};
      (rule.match_headers ?? rule.headers).forEach((item) => {
        const name = String(item?.name || '').trim();
        if (!name) return;
        out[name] = String(item?.value ?? '');
      });
      return out;
    }
    if (rule.headerMatch && typeof rule.headerMatch === 'object') {
      const out = {};
      Object.entries(rule.headerMatch).forEach(([name, value]) => {
        const n = String(name || '').trim();
        if (!n) return;
        out[n] = String(value ?? '');
      });
      return out;
    }
    return {};
  }

  function toRuleDrafts(rules, kind) {
    if (!Array.isArray(rules)) return [];
    return rules.map((rule) => {
      const name = String(rule?.name || '').trim();
      const expr = String(rule?.expr || '');
      const headersText = headersObjectToMultiline(normalizeRuleHeaders(rule));
      if (kind === 'request') {
        const statusList = Array.isArray(rule?.match_status ?? rule?.status) ? (rule.match_status ?? rule.status) : [];
        return {
          name,
          statusCsv: statusList.map((s) => String(s || '')).filter(Boolean).join(', '),
          headersText,
          expr,
        };
      }
      const methodList = Array.isArray(rule?.match_method ?? rule?.method) ? (rule.match_method ?? rule.method) : [];
      return {
        name,
        methodCsv: methodList.map((m) => String(m || '')).filter(Boolean).join(', '),
        headersText,
        expr,
      };
    });
  }

  function requestTemplateBodyToText(bodyType, body) {
    const type = String(bodyType || 'none').toLowerCase();
    if (type === 'none') return '';
    if (type === 'json') {
      try { return JSON.stringify(body ?? {}, null, 2); } catch { return '{}'; }
    }
    if (type === 'urlencoded' && body && typeof body === 'object') {
      try { return new URLSearchParams(body).toString(); } catch { return ''; }
    }
    return String(body == null ? '' : body);
  }

  function parseRequestTemplateBody(text) {
    const raw = String(text || '').trim();
    if (!raw) return { body_type: 'none', body: {} };
    try {
      return { body_type: 'json', body: JSON.parse(raw) };
    } catch {
      return { body_type: 'raw', body: raw };
    }
  }

  function requestTemplateToDraft(requestValue, fallbackMethod = 'POST') {
    const req = requestValue && typeof requestValue === 'object' ? requestValue : {};
    const authorization = req.authorization && typeof req.authorization === 'object' ? req.authorization : {};
    let authType = 'none';
    let authHeaderName = 'Authorization';
    let authSecretRef = '';
    if (authorization.type === 'static') {
      authType = 'static';
      const staticHeaders = authorization?.static?.headers && typeof authorization.static.headers === 'object'
        ? authorization.static.headers
        : {};
      const first = Object.entries(staticHeaders)[0] || [];
      authHeaderName = String(first[0] || 'Authorization');
      authSecretRef = String(authorization?.static?.secret_ref || '');
    } else if (authorization.type === 'key_rotation') {
      authType = 'advanced';
    }
    const bodyType = String(req.body_type || 'none').toLowerCase();
    return {
      method: String(req.method || fallbackMethod || 'POST').toUpperCase(),
      url: String(req.url || ''),
      headersText: headersObjToText(req.headers || {}),
      bodyText: requestTemplateBodyToText(bodyType, req.body),
      authType,
      authHeaderName,
      authSecretRef,
    };
  }

  function requestTemplateDraftToPayload(draft, fixedAdvancedProfile) {
    const method = String(draft?.method || 'POST').toUpperCase();
    const url = String(draft?.url || '').trim();
    const bodyParsed = parseRequestTemplateBody(draft?.bodyText || '');
    const out = {
      method,
      url,
      headers: headersTextToObj(draft?.headersText || ''),
      body_type: bodyParsed.body_type,
      body: bodyParsed.body,
    };
    const authType = String(draft?.authType || 'none');
    if (authType === 'static') {
      const headerName = String(draft?.authHeaderName || 'Authorization').trim() || 'Authorization';
      const secretRef = String(draft?.authSecretRef || '').trim();
      if (secretRef) {
        out.authorization = {
          type: 'static',
          static: {
            headers: { [headerName]: '${' + secretRef + '}' },
            secret_ref: secretRef,
          },
        };
      }
    } else if (authType === 'advanced') {
      out.authorization = {
        type: 'key_rotation',
        key_rotation: { profile: String(fixedAdvancedProfile || '').trim() || null },
      };
    }
    return out;
  }

  function formatTimestamp(ts) {
    if (!ts) return 'n/a';
    try { return new Date(ts).toLocaleString(); } catch { return String(ts); }
  }

  function readBody(type, text) {
    if (type === 'none') return { type: 'none' };
    if (type === 'raw') return { type: 'raw', raw: String(text || '') };
    const trimmed = String(text || '').trim();
    if (!trimmed) return { type: 'json', value: {} };
    try {
      return { type: 'json', value: JSON.parse(trimmed) };
    } catch {
      throw new Error('Token request body JSON is invalid.');
    }
  }

  function slotLabel(slot, alias) {
    const fallback = slot === 'secret2' ? 'Secret2' : 'Secret1';
    const named = String(alias || '').trim();
    return named || fallback;
  }

  function shellQuote(text) {
    return "'" + String(text == null ? '' : text).replace(/'/g, "'\"'\"'") + "'";
  }

  function sandboxTemplateUrl(path) {
    const raw = String(path || '').trim();
    if (!raw) return '';
    if (/^https?:\/\//i.test(raw)) return raw;
    try {
      return new URL(raw, window.location.origin).toString();
    } catch {
      return raw;
    }
  }

  function redactHeaderValue(name, value) {
    if (!SANDBOX_REDACT_HEADERS.has(String(name || '').toLowerCase())) return value;
    return '[REDACTED]';
  }

  function buildSandboxTemplates() {
    return {
      status_page: { label: 'GET /_apiproxy', method: 'GET', path: '/_apiproxy', auth_mode: 'none', headers: {}, body: null },
      request_passthrough: {
        label: 'POST /_apiproxy/request',
        method: 'POST',
        path: '/_apiproxy/request',
        auth_mode: 'proxy_key',
        headers: { 'Content-Type': 'application/json' },
        body: { upstream: { method: 'GET', url: '/json' } },

      admin_version: { label: 'GET ' + API_ROOT + '/version', method: 'GET', path: API_ROOT + '/version', auth_mode: 'admin_token', headers: {}, body: null },
      admin_keys_get: { label: 'GET ' + API_ROOT + '/keys', method: 'GET', path: API_ROOT + '/keys', auth_mode: 'admin_token', headers: {}, body: null },
      admin_debug_get: { label: 'GET ' + API_ROOT + '/debug', method: 'GET', path: API_ROOT + '/debug', auth_mode: 'admin_token', headers: {}, body: null },
      admin_debug_enable: {
        label: 'PUT ' + API_ROOT + '/debug',
        method: 'PUT',
        path: API_ROOT + '/debug',
        auth_mode: 'admin_token',
        headers: { 'Content-Type': 'application/json' },
        body: { enabled: true, ttl_seconds: 3600 },
      },
      admin_debug_last: { label: 'GET ' + API_ROOT + '/debug/last', method: 'GET', path: API_ROOT + '/debug/last', auth_mode: 'admin_token', headers: {}, body: null },
      admin_config_get: { label: 'GET ' + API_ROOT + '/config', method: 'GET', path: API_ROOT + '/config', auth_mode: 'admin_token', headers: {}, body: null },
    };
  }

    const [adminIpCidrsText, setAdminIpCidrsText] = React.useState('n/a');
    const sandboxTemplates = React.useMemo(() => buildSandboxTemplates(), []);
    const sandboxTemplateOptions = React.useMemo(
      () => Object.entries(sandboxTemplates).map(([key, tpl]) => ({ key, label: String(tpl?.label || key) })),
      [sandboxTemplates]
    );
    const availableSecretRefs = ['secret1', 'secret2'].filter((slot) => !!secretStatus[slot]);

    function applyDebugState(payload) {
      const data = payload?.data || {};
      const enabled = !!data.enabled;
      const expiresMs = Number(data.enabled_until_ms || 0);
      const remainingSeconds = Number(data.ttl_remaining_seconds || 0);
      setLoggingEnabled(enabled);
      setLoggingExpiresAt(expiresMs > 0 ? new Date(expiresMs).toISOString() : 'n/a');
      setLoggingRemainingHours(remainingSeconds > 0 ? (remainingSeconds / 3600).toFixed(2) + ' hours' : 'n/a');
    }

    function getLoggingTtlSeconds() {
      const presetSeconds = LOGGING_TTL_PRESET_SECONDS[String(loggingTtlPreset || '')];
      if (presetSeconds) return presetSeconds;
      const customHours = Number(loggingTtlCustomHours || 0);
      if (!Number.isFinite(customHours) || customHours < 1) throw new Error('Custom logging TTL must be at least 1 hour.');
      return Math.round(customHours * 3600);
    }

    function sandboxBuildAuthHeader(mode, value) {
      const m = String(mode || 'admin_token');
      if (m === 'none') return {};
      if (m === 'admin_token') {
        const token = getToken();
        return token ? { authorization: 'Bearer ' + token } : {};
      }
      const v = String(value || '').trim();
      if (!v) return {};
      if (m === 'admin_key') return { 'x-admin-key': v };
      if (m === 'proxy_key') return { 'x-proxy-key': v };
      if (m === 'issuer_key') return { 'x-issuer-key': v };
      return {};
    }

    function buildSandboxCurl(method, url, headers, bodyText) {
      const lines = ['curl \\', '  -X ' + shellQuote(method)];
      Object.entries(headers || {}).forEach(([name, value]) => {
        if (value == null || String(value).trim() === '') return;
        lines.push('  -H ' + shellQuote(String(name) + ': ' + String(redactHeaderValue(name, value))) + ' \\');
      });
      if (String(bodyText || '') !== '') {
        lines.push('  --data ' + shellQuote(String(bodyText)) + ' \\');
      }
      lines.push('  ' + shellQuote(url || ''));
      return lines.join('\n');
    }

    function setRequestTemplateField(setter, field, value) {
      setter((prev) => ({ ...prev, [field]: value }));
    }

    function applySandboxTemplate(key) {
      const nextKey = String(key || '');
      const tpl = sandboxTemplates[nextKey];
      if (!tpl) return;
      setSandboxTemplateKey(nextKey);
      setSandboxAuthMode(String(tpl.auth_mode || 'admin_token'));
      setSandboxMethod(String(tpl.method || 'GET').toUpperCase());
      setSandboxUrl(sandboxTemplateUrl(tpl.path || ''));
      setSandboxHeaders(headersObjToText(tpl.headers || {}));
      if (tpl.body == null) setSandboxBody('');
      else if (typeof tpl.body === 'string') setSandboxBody(String(tpl.body));
      else setSandboxBody(JSON.stringify(tpl.body, null, 2));
      setSandboxResponse('');
    }

    function applyTransformState(payload) {
      const data = payload?.data || {};
      const sourceRequest = data?.source_request || {};
      const targetResponse = data?.target_response || {};
      const headerFiltering = targetResponse?.header_filtering || {};
      setRequestTransformEnabled(!!sourceRequest.enabled);
      setRequestTransformPreprocessor(String(sourceRequest.custom_js_preprocessor || ''));
      setRequestRuleDrafts(toRuleDrafts(sourceRequest.rules, 'request'));
      const requestHeaderFiltering = sourceRequest?.header_filtering || {};
      setRequestHeaderMode(String(requestHeaderFiltering.mode || 'blacklist'));
      setRequestHeaderNamesText(
        Array.isArray(requestHeaderFiltering.names) ? requestHeaderFiltering.names.map((name) => String(name || '')).join('\n') : ''
      );
      setResponseTransformEnabled(targetResponse.enabled !== false);
      setResponseTransformPreprocessor(String(targetResponse.custom_js_preprocessor || ''));
      setResponseHeaderMode(String(headerFiltering.mode || 'blacklist'));
      setResponseHeaderNamesText(
        Array.isArray(headerFiltering.names) ? headerFiltering.names.map((name) => String(name || '')).join('\n') : ''
      );
      setResponseRuleDrafts(toRuleDrafts(targetResponse.rules, 'response'));
    }

    function applyNetworkControlsState(payload) {
      const controls = payload?.data?.traffic_controls || {};
      const ipFilter = controls?.ip_filter || {};
      const requestRateLimit = controls?.request_rate_limit || {};
      setNetworkControlsEnabled(!!ipFilter.enabled || !!requestRateLimit.enabled);
      setNetworkIpFilterEnabled(!!ipFilter.enabled);
      setNetworkAllowedCidrsText(
        Array.isArray(ipFilter.allowed_cidrs) && ipFilter.allowed_cidrs.length
          ? ipFilter.allowed_cidrs.map((cidr) => String(cidr || '')).join('\n')
          : '0.0.0.0/0\n::/0'
      );
      setNetworkRpmEnabled(!!requestRateLimit.enabled);
      setNetworkRpmLimit(String(Number(requestRateLimit.rpm_rate_limit || 120)));
    }

    function formatKeyStatusBlock(kindLabel, keyData) {
      const data = keyData || {};
      const primaryState = data.primary_active ? 'active' : 'inactive';
      const secondaryState = data.secondary_active ? 'active' : 'inactive';
      const primaryCreated = formatTimestamp(data.kind_primary_key_created_at);
      const secondaryCreated = formatTimestamp(data.kind_secondary_key_created_at);
      const expiry = data.expiry_seconds == null ? 'Never' : (String(data.expiry_seconds) + 's');
      return [
        kindLabel + ' Key',
        'Primary: ' + primaryState + ' (created: ' + primaryCreated + ')',
        'Secondary: ' + secondaryState + ' (created: ' + secondaryCreated + ')',
        'Expiry: ' + expiry,
      ].join('\n');
    }

    function applyKeysStatusState(payload) {
      const data = payload?.data || {};
      setProxyKeyStatusText(formatKeyStatusBlock('Proxy', data.proxy));
      setIssuerKeyStatusText(formatKeyStatusBlock('Issuer', data.issuer));
      setAdminKeyStatusText(formatKeyStatusBlock('Admin', data.admin));
    }

    function applyJwtConfigState(payload) {
      const data = payload?.data || {};
      const jwt = data.jwt || {};
      const inbound = jwt.inbound || {};
      const outbound = jwt.outbound || {};
      setProxyExpirySeconds(data.proxy_expiry_seconds == null ? '' : String(data.proxy_expiry_seconds));
      setIssuerExpirySeconds(data.issuer_expiry_seconds == null ? '' : String(data.issuer_expiry_seconds));
      const inboundEnabled = !!inbound.enabled;
      const inboundMode = inboundEnabled ? String(inbound.mode || 'shared_secret') : 'none';
      setJwtInboundMode(inboundMode);
      setJwtInboundHeader(String(inbound.header || 'Authorization'));
      setJwtInboundScheme(String(inbound.scheme || ''));
      setJwtInboundIssuer(String(inbound.issuer || ''));
      setJwtInboundAudience(String(inbound.audience || ''));
      setJwtInboundClockSkew(inbound.clock_skew_seconds == null ? '' : String(inbound.clock_skew_seconds));
      const inboundRequest = inbound.http_request || jwt.http_request || {};
      setJwtInboundJwksRequestDraft(requestTemplateToDraft(inboundRequest, 'GET'));
      setJwtInboundJwksEnabled(inboundMode === 'jwks' && !!inboundRequest?.url);
      setJwtInboundTsFormat(String(data.jwt_inbound_timestamp_format || 'epoch_ms'));
      const outboundEnabled = !!outbound.enabled;
      setJwtOutboundMode(outboundEnabled ? 'shared_secret' : 'none');
      setJwtOutboundHeader(String(outbound.header || 'Authorization'));
      setJwtOutboundScheme(String(outbound.scheme || ''));
      setJwtOutboundIssuer(String(outbound.issuer || ''));
      setJwtOutboundAudience(String(outbound.audience || ''));
      setJwtOutboundSubject(String(outbound.subject || ''));
      setJwtOutboundTtl(outbound.ttl_seconds == null ? '' : String(outbound.ttl_seconds));
    }

    function applyLoggingExternalState(configPayload, secretPayload) {
      const data = configPayload?.data || {};
      const request = data.request || {};
      setLoggingExternalEnabled(!!data.enabled);
      setLoggingExternalRequestDraft(requestTemplateToDraft(request, 'POST'));
      setLoggingExternalTsFormat(String(data.timestamp_format || 'epoch_ms'));
      setLoggingExternalSecretSet(!!secretPayload?.data?.secret_set);
    }

    async function downloadLatestYaml() {
      try {
        const latest = await apiText('/config');
        const blob = new Blob([String(latest || '')], { type: 'text/yaml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const now = new Date();
        const y = String(now.getFullYear());
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        const a = document.createElement('a');
        a.href = url;
        a.download = 'simpleproxy-config-' + y + m + d + '-' + hh + mm + ss + '.yaml';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (err) {
        setError(String(err && err.message || err));
      }
    }

    async function saveKeysView() {
      setKeysBusy(true);
      setKeysMessage('');
      setError('');
      try {
        const inboundMode = String(jwtInboundMode || 'none');
        const inboundEnabled = inboundMode !== 'none';
        const outboundEnabled = String(jwtOutboundMode || 'none') !== 'none';
        const useJwksRequest = inboundMode === 'jwks' && !!jwtInboundJwksEnabled;
        const jwksRequest = useJwksRequest
          ? requestTemplateDraftToPayload(jwtInboundJwksRequestDraft, 'jwt_inbound')
          : null;
        const jwtPayload = {
          enabled: inboundEnabled || outboundEnabled,
          inbound: {
            enabled: inboundEnabled,
            mode: inboundEnabled ? inboundMode : 'shared_secret',
            header: String(jwtInboundHeader || 'Authorization'),
            scheme: String(jwtInboundScheme || '').trim() || null,
            issuer: String(jwtInboundIssuer || '').trim() || null,
            audience: String(jwtInboundAudience || '').trim() || null,
            clock_skew_seconds: String(jwtInboundClockSkew || '').trim() === '' ? null : Number(jwtInboundClockSkew),
            http_request: jwksRequest,
          },
          outbound: {
            enabled: outboundEnabled,
            header: String(jwtOutboundHeader || 'Authorization'),
            scheme: String(jwtOutboundScheme || '').trim() || null,
            issuer: String(jwtOutboundIssuer || '').trim() || null,
            audience: String(jwtOutboundAudience || '').trim() || null,
            subject: String(jwtOutboundSubject || '').trim() || null,
            ttl_seconds: String(jwtOutboundTtl || '').trim() === '' ? null : Number(jwtOutboundTtl),
          },
        };
        await apiJson('/jwt-config', 'PUT', {
          jwt: jwtPayload,
          jwt_inbound_timestamp_format: String(jwtInboundTsFormat || 'epoch_ms'),
          proxy_expiry_seconds: String(proxyExpirySeconds || '').trim() === '' ? null : Number(proxyExpirySeconds),
          issuer_expiry_seconds: String(issuerExpirySeconds || '').trim() === '' ? null : Number(issuerExpirySeconds),
        });
        await refreshKeysView();
        setKeysMessage('API Keys and JWT settings saved.');
      } catch (err) {
        setError(String(err && err.message || err));
      } finally {
        setKeysBusy(false);
      }
    }

    React.useEffect(() => {
      if (strategy !== 'static') return;
      if (availableSecretRefs.includes(authSecretRef)) return;
      setAuthSecretRef(availableSecretRefs[0] || '');
    }, [strategy, authSecretRef, availableSecretRefs.join('|')]);

    React.useEffect(() => {
      if (!getToken()) return clearTokenAndExit();
      async function loadTargetSecretState() {
        const [namePayload, s1, s2] = await Promise.all([
          apiJson('/http-auth/target/secret-names', 'GET'),
          apiJson('/http-auth/target/secrets/secret1', 'GET'),
          apiJson('/http-auth/target/secrets/secret2', 'GET'),
        ]);
        const names = namePayload?.data?.secret_names || {};
        setSecretNames({
          secret1: String(names.secret1 || ''),
          secret2: String(names.secret2 || ''),
        });
        setSecretStatus({
          secret1: !!s1?.data?.secret_set,
          secret2: !!s2?.data?.secret_set,
        });
      }

      (async () => {
        try {
          const [versionRes, debugRes, headersRes, cfgYaml, keyRotation, transformCfg, networkControlsCfg] = await Promise.all([
            apiJson('/version'),
            apiJson('/debug'),
            apiJson('/headers'),
            apiText('/config'),
            apiJson('/key-rotation-config'),
            apiJson('/transform-config'),
            apiJson('/network-controls'),
          ]);
          if (!versionRes || !keyRotation || !transformCfg || !networkControlsCfg) return;
          setYamlText(cfgYaml || '');
          setProxyName(parseTopLevelYamlValue(cfgYaml, 'proxyName'));
          setTargetHost(parseTopLevelYamlValue(cfgYaml, 'targetHost'));
          setStatus({
            version: String(versionRes?.data?.version || ''),
            build: String(versionRes?.data?.build_timestamp || ''),
            debug: !!debugRes?.data?.enabled,
            enrichments: Array.isArray(headersRes?.enriched_headers) ? headersRes.enriched_headers : [],
          });
          const adminControls = versionRes?.data?.admin_controls || {};
          const loginRpm = Number(adminControls?.login_page?.rpm_rate_limit || 0);
          const tokenRpm = Number(adminControls?.get_admin_token_endpoint?.rpm_rate_limit || 0);
          const adminCidrs = Array.isArray(adminControls?.ip_filter?.allowed_cidrs)
            ? adminControls.ip_filter.allowed_cidrs
            : [];
          setAdminLoginEnabledText(!!adminControls?.login_page?.enabled ? 'Enabled' : 'Disabled');
          setAdminLoginRpmText(Number.isFinite(loginRpm) && loginRpm > 0 ? String(loginRpm) : 'n/a');
          setAdminTokenEnabledText(!!adminControls?.get_admin_token_endpoint?.enabled ? 'Enabled' : 'Disabled');
          setAdminTokenRpmText(Number.isFinite(tokenRpm) && tokenRpm > 0 ? String(tokenRpm) : 'n/a');
          setAdminIpEnabledText(!!adminControls?.ip_filter?.enabled ? 'Enabled' : 'Disabled');
          setAdminIpCidrsText(adminCidrs.length ? adminCidrs.join(', ') : 'n/a');
          applyDebugState(debugRes);
          const d = keyRotation.data || {};
          const req = d.request || {};
          const enabled = !!d.enabled;
          const reqAuthType = String(req?.authorization?.type || '').trim();
          if (!enabled) setStrategy('none');
          else if (reqAuthType === 'static') setStrategy('static');
          else setStrategy('advanced');

          setReqMethod(String(req.method || 'POST').toUpperCase());
          setReqUrl(String(req.url || ''));
          setReqHeaders(headersObjToText(req.headers || {}));
          if (req.body && req.body.type === 'raw') {
            setReqBodyType('raw');
            setReqBody(String(req.body.raw || ''));
          } else if (req.body && req.body.type === 'none') {
            setReqBodyType('none');
            setReqBody('');
          } else {
            setReqBodyType('json');
            setReqBody(JSON.stringify((req.body && req.body.value) || {}, null, 2));
          }
          setAuthType(reqAuthType || 'none');
          setAuthHeaderName(String(req?.authorization?.header_name || 'Authorization'));
          setAuthSecretRef(String(req?.authorization?.secret_ref || 'secret1'));
          setKeyPath(String(d.key_path || 'data.apiKey'));
          setTtlPath(d.ttl_path == null ? '' : String(d.ttl_path));
          setTtlUnit(String(d.ttl_unit || 'seconds'));
          setExpiresAtPath(d.expires_at_path == null ? '' : String(d.expires_at_path));
          setRefreshSkew(String(Number(d.refresh_skew_seconds || 0)));
          setRetry401(!!d.retry_once_on_401);
          applyTransformState(transformCfg);
          applyNetworkControlsState(networkControlsCfg);
          applySandboxTemplate(sandboxTemplateOptions?.[0]?.key || 'status_page');
          await (async () => {
            try {
              const last = await apiJson('/debug/last', 'GET');
              setLoggingLastOutput(JSON.stringify(last, null, 2));
            } catch {
              setLoggingLastOutput('Debug output appears here.');
            }
          })();
          await loadTargetSecretState();
          await refreshKeysView();
          await refreshLoggingExternalView();
        } catch (err) {
          setError(String(err && err.message || err));
        }
      })();
    }, []);

      setSecretBusy(true);
      setOk('');
      setError('');
      try {
        const payload = {
          secret1_name: slot === 'secret1' ? String(secretDraftName || '') : undefined,
          secret2_name: slot === 'secret2' ? String(secretDraftName || '') : undefined,
        };
        await apiJson('/http-auth/target/secret-names', 'PUT', payload);
        const val = String(secretDraftValue || '').trim();
        if (val) {
          await apiJson('/http-auth/target/secrets/' + encodeURIComponent(slot), 'PUT', { value: val });
        }
        await refreshTargetSecrets();
        setOk(val ? 'Secret saved.' : 'Secret name saved.');
        closeSecretEditor();
      } catch (err) {
        setError(String(err && err.message || err));
      } finally {
        setSecretBusy(false);
      }
    }

    async function removeSecretSlot(slot) {

      setError('');

        await apiJson('/http-auth/target/secrets/' + encodeURIComponent(slot), 'DELETE');
        await refreshTargetSecrets();
        setOk('Secret removed.');
        closeSecretEditor();

      } finally {

    function openLiveLogPage() {
      window.open(API_ROOT + '/live-log', '_blank', 'noopener,noreferrer');
    }

    async function sendSandboxRequest() {
      setSandboxBusy(true);
      setError('');
      setSandboxResponse('');
      try {
        const method = String(sandboxMethod || 'GET').toUpperCase();
        const url = String(sandboxUrl || '').trim();
        if (!url) throw new Error('Sandbox URL is required.');
        const bodyText = String(sandboxBody || '');
        const headers = {
          ...headersTextToObj(sandboxHeaders),
          ...sandboxBuildAuthHeader(sandboxAuthMode, sandboxAuthValue),
        };
        setSandboxCurlPreview(buildSandboxCurl(method, url, headers, bodyText));
        const res = await fetch(url, {
          method,
          headers,
          body: bodyText ? bodyText : undefined,
        });
        const text = await res.text();
        let parsed = null;
        try { parsed = JSON.parse(text); } catch {}
        setSandboxResponse(JSON.stringify({
          status: res.status,
          ok: res.ok,
          headers: Object.fromEntries(res.headers.entries()),
          body: parsed == null ? text : parsed,
        }, null, 2));
      } catch (err) {
        setError(String(err && err.message || err));
        setSandboxResponse(String(err && err.message || err));
      } finally {
        setSandboxBusy(false);
      }
    }

    function setRequestRuleField(index, field, value) {
      setRequestRuleDrafts((prev) => prev.map((rule, i) => (i === index ? { ...rule, [field]: value } : rule)));
    }

    function setResponseRuleField(index, field, value) {
      setResponseRuleDrafts((prev) => prev.map((rule, i) => (i === index ? { ...rule, [field]: value } : rule)));
    }

    function addRequestRule() {
      setRequestRuleDrafts((prev) => [...prev, { name: '', statusCsv: '', headersText: '', expr: '' }]);
    }

    function addResponseRule() {
      setResponseRuleDrafts((prev) => [...prev, { name: '', methodCsv: '', headersText: '', expr: '' }]);
    }

    function removeRequestRule(index) {
      setRequestRuleDrafts((prev) => prev.filter((_, i) => i !== index));
    }

    function removeResponseRule(index) {
      setResponseRuleDrafts((prev) => prev.filter((_, i) => i !== index));
    }

    function parseCsvList(raw) {
      return String(raw || '')
        .split(',')
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function buildRequestRulesFromDrafts() {
      return requestRuleDrafts
        .map((rule) => ({
          name: String(rule?.name || '').trim(),
          expr: String(rule?.expr || ''),
          match_status: parseCsvList(rule?.statusCsv || ''),
          match_headers: Object.entries(headersTextToObj(rule?.headersText || ''))
            .map(([name, value]) => ({ name: String(name || '').trim(), value: String(value ?? '') }))
            .filter((item) => item.name && item.value),
        }))
        .filter((rule) => rule.name && rule.expr.trim())
        .map((rule) => ({
          name: rule.name,
          expr: rule.expr,
          ...(rule.match_status.length ? { match_status: rule.match_status } : {}),
          ...(rule.match_headers.length ? { match_headers: rule.match_headers } : {}),
        }));
    }

    function buildResponseRulesFromDrafts() {
      return responseRuleDrafts
        .map((rule) => ({
          name: String(rule?.name || '').trim(),
          expr: String(rule?.expr || ''),
          match_method: parseCsvList(rule?.methodCsv || '').map((item) => item.toUpperCase()),
          match_headers: Object.entries(headersTextToObj(rule?.headersText || ''))
            .map(([name, value]) => ({ name: String(name || '').trim(), value: String(value ?? '') }))
            .filter((item) => item.name && item.value),
        }))
        .filter((rule) => rule.name && rule.expr.trim())
        .map((rule) => ({
          name: rule.name,
          expr: rule.expr,
          ...(rule.match_method.length ? { match_method: rule.match_method } : {}),
          ...(rule.match_headers.length ? { match_headers: rule.match_headers } : {}),
        }));
    }

    async function saveRequestTransformView() {
      setTransformBusy(true);
      setTransformMessage('');
      setError('');
      try {
        const rules = buildRequestRulesFromDrafts();
        await apiJson('/transform-config', 'PUT', {
          source_request: {
            enabled: !!requestTransformEnabled,
            custom_js_preprocessor: String(requestTransformPreprocessor || '').trim() || null,
            header_filtering: {
              mode: String(requestHeaderMode || 'blacklist'),
              names: textToLines(requestHeaderNamesText),
            },
            rules,
          },
        });
        await refreshTransformViews();
        setTransformMessage('Request transformations saved.');

        setError(String(err && err.message || err));
      } finally {
        setTransformBusy(false);
      }
    }

    async function saveNetworkControlsView() {
      setNetworkControlsBusy(true);
      setNetworkControlsMessage('');
      setError('');
      try {
        const rpm = Number(networkRpmLimit || 0);
        if (!Number.isInteger(rpm) || rpm < 1) {
          throw new Error('Rate limit must be an integer >= 1.');
        }
        const controlsEnabled = !!networkControlsEnabled;
        await apiJson('/network-controls', 'PUT', {
          ip_filter: {
            enabled: controlsEnabled && !!networkIpFilterEnabled,
            allowed_cidrs: controlsEnabled ? textToLines(networkAllowedCidrsText) : [],
          },
          request_rate_limit: {
            enabled: controlsEnabled && !!networkRpmEnabled,
            rpm_rate_limit: rpm,
          },
        });
        await refreshNetworkControlsView();
        setNetworkControlsMessage('Network controls saved.');
      } catch (err) {
        setError(String(err && err.message || err));
      } finally {
        setNetworkControlsBusy(false);
      }
    }

    React.useEffect(() => {
      const method = String(sandboxMethod || 'GET').toUpperCase();
      const url = String(sandboxUrl || '').trim();
      const bodyText = String(sandboxBody || '');
      const headers = {
        ...headersTextToObj(sandboxHeaders),
        ...sandboxBuildAuthHeader(sandboxAuthMode, sandboxAuthValue),
      };
      setSandboxCurlPreview(buildSandboxCurl(method, url, headers, bodyText));
    }, [sandboxMethod, sandboxUrl, sandboxHeaders, sandboxBody, sandboxAuthMode, sandboxAuthValue]);

    function renderOverviewStatus() {
      return e('div', { className: 'ra-grid' },
        e('div', { className: 'ra-card' },
          e('div', { className: 'ra-pill' }, 'Status'),
          e('div', null, e('b', null, 'Proxy Name:'), ' ', proxyName || 'n/a'),
          e('div', null, e('b', null, 'Debug Enabled:'), ' ', status.debug ? 'yes' : 'no'),
          e('div', null, e('b', null, 'Target URL:'), ' ', targetHost || 'n/a'),
          e('div', null, e('b', null, 'Enrichments:'), ' ', (status.enrichments && status.enrichments.length) ? status.enrichments.join(', ') : 'n/a')
        ),
        e('div', { className: 'ra-card' },
          e('div', { className: 'ra-pill' }, 'Build'),
          e('div', null, e('b', null, 'Version:'), ' ', status.version || 'unknown'),
          e('div', null, e('b', null, 'Build Timestamp:'), ' ', status.build || 'n/a')
        )
      );
    }

    async function saveGeneral() {
      setSaving(true);
      setError('');
      setOk('');
      try {
        let nextYaml = String(yamlText || '');
        nextYaml = setTopLevelYamlValue(nextYaml, 'proxyName', proxyName, true);
        nextYaml = setTopLevelYamlValue(nextYaml, 'targetHost', targetHost, false);
        await putYaml('/config', nextYaml);
        setYamlText(nextYaml);

        const request = {
          method: String(reqMethod || 'POST').toUpperCase(),
          url: String(reqUrl || '').trim(),
          headers: headersTextToObj(reqHeaders),
          body: readBody(reqBodyType, reqBody),
        };
        if (strategy === 'none') {
          request.authorization = { type: 'none' };
        } else if (strategy === 'static') {
          const chosenRef = String(authSecretRef || '').trim();
          if (!chosenRef) throw new Error('Set at least one secret slot, then select it for static auth.');
          request.authorization = {
            type: 'static',
            header_name: String(authHeaderName || 'Authorization').trim() || 'Authorization',
            secret_ref: chosenRef,
          };
        } else {
          request.authorization = { type: String(authType || 'oauth_client_credentials') };
        }

        const payload = {
          enabled: strategy !== 'none',
          strategy: strategy === 'advanced' ? 'oauth_client_credentials' : 'json_ttl',
          request,
          key_path: String(keyPath || '').trim(),
          ttl_path: String(ttlPath || '').trim() || null,
          ttl_unit: String(ttlUnit || 'seconds'),
          expires_at_path: String(expiresAtPath || '').trim() || null,
          refresh_skew_seconds: Number(refreshSkew || 0),
          retry_once_on_401: !!retry401,
        };
        await apiJson('/key-rotation-config', 'PUT', payload);
        setOk('General saved.');
      } catch (err) {
        setError(String(err && err.message || err));
      } finally {
        setSaving(false);
      }
    }

    const nav = e('div', { className: 'ra-nav' },
      e('button', { className: view === 'general' ? 'active' : '', onClick: () => setView('general') }, 'General'),
      e('button', { className: view === 'logging' ? 'active' : '', onClick: () => setView('logging') }, 'Logging'),
      e('button', { className: view === 'sandbox' ? 'active' : '', onClick: () => setView('sandbox') }, 'API Sandbox'),
      e('button', { className: view === 'request-transform' ? 'active' : '', onClick: () => setView('request-transform') }, 'Request Transformations'),
      e('button', { className: view === 'response-transform' ? 'active' : '', onClick: () => setView('response-transform') }, 'Response Transformations'),
      e('button', { className: view === 'network-controls' ? 'active' : '', onClick: () => setView('network-controls') }, 'Network Controls'),
      e('button', { className: view === 'config' ? 'active' : '', onClick: () => setView('config') }, 'YAML Configuration'),
      e('button', { className: view === 'keys' ? 'active' : '', onClick: () => setView('keys') }, 'API Keys'),
      e('button', { onClick: clearTokenAndExit }, 'Logout')
    );

    {{react_admin_view_general_js}}

    return e('div', { className: 'ra-shell' },
