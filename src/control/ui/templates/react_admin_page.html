<div id="react-admin-root"></div>
<script src="/_admin/assets/react.js"></script>
<script src="/_admin/assets/react-dom.js"></script>
<script>
(function () {
  const API_ROOT = '{{admin_api_root}}';
  const LOGIN_ROOT = '{{login_root}}';
  const TOKEN_STORAGE = 'apiproxy_admin_access_token_v1';
  const e = React.createElement;

  const styles = `
    :root {
      --ra-bg: #f4f7fb;
      --ra-surface: #ffffff;
      --ra-border: #dbe5f3;
      --ra-text: #0f172a;
      --ra-subtext: #475569;
      --ra-primary: #2563eb;
    }
    body { margin: 0; background: var(--ra-bg); color: var(--ra-text); font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif; }
    .ra-shell { min-height: 100vh; display: grid; grid-template-columns: 260px 1fr; }
    .ra-side { background: linear-gradient(180deg, #0f172a 0%, #111827 100%); color: #e2e8f0; padding: 24px 18px; }
    .ra-brand { font-size: 20px; font-weight: 700; line-height: 1.2; margin-bottom: 18px; }
    .ra-note { margin: 4px 0 16px; font-size: 12px; color: #94a3b8; }
    .ra-nav button { width: 100%; text-align: left; background: transparent; border: 1px solid transparent; color: #cbd5e1; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; }
    .ra-nav button.active { background: rgba(148, 163, 184, 0.16); border-color: rgba(148, 163, 184, 0.25); color: #fff; }
    .ra-main { padding: 24px; }
    .ra-card { background: var(--ra-surface); border: 1px solid var(--ra-border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .ra-title { font-size: 24px; font-weight: 700; margin: 0 0 8px; }
    .ra-sub { color: var(--ra-subtext); font-size: 14px; margin: 0 0 12px; }
    .ra-field { display: block; margin: 10px 0 4px; font-weight: 600; font-size: 13px; }
    .ra-input, .ra-select, .ra-textarea { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; background: #fff; color: #0f172a; }
    .ra-input, .ra-select { max-width: 640px; }
    .ra-textarea { min-height: 110px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .ra-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    .ra-pill { display: inline-block; padding: 3px 8px; border-radius: 999px; background: #e8f0ff; color: #1d4ed8; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    .ra-btn { border: 1px solid #cbd5e1; border-radius: 10px; background: #fff; color: #0f172a; padding: 8px 12px; cursor: pointer; }
    .ra-btn.primary { background: var(--ra-primary); color: #fff; border-color: var(--ra-primary); }
    .ra-row { display: grid; grid-template-columns: 160px minmax(260px, 1fr); gap: 10px; align-items: center; margin-bottom: 10px; }
    .ra-hr { border: none; border-top: 1px solid #e2e8f0; margin: 12px 0; }
    .ra-err { color: #b91c1c; font-size: 13px; }
    .ra-ok { color: #166534; font-size: 13px; }
    .ra-dim { color: #64748b; font-size: 12px; }
    .ra-secret-list { display: grid; gap: 10px; margin-top: 8px; }
    .ra-secret-chip { border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; background: #fff; }
    .ra-secret-chip.set { border-color: #86efac; background: #f0fdf4; }
    .ra-secret-chip.unset { border-color: #cbd5e1; background: #f8fafc; }
    .ra-secret-chip-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .ra-secret-chip-title { font-weight: 700; font-size: 13px; }
    .ra-secret-chip-status { font-size: 12px; padding: 2px 8px; border-radius: 999px; border: 1px solid transparent; }
    .ra-secret-chip-status.set { color: #166534; background: #dcfce7; border-color: #86efac; }
    .ra-secret-chip-status.unset { color: #475569; background: #e2e8f0; border-color: #cbd5e1; }
    .ra-secret-chip-note { font-size: 11px; color: #64748b; margin-top: 6px; }
    .ra-link-btn { border: none; background: transparent; color: #1d4ed8; text-decoration: underline; cursor: pointer; font-size: 12px; padding: 0; }
    .ra-secret-drawer { margin-top: 10px; border-top: 1px solid #dbe5f3; padding-top: 10px; }
    .ra-secret-actions { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
    .ra-btn.danger { border-color: #ef4444; color: #b91c1c; background: #fff; }
  `;

  const style = document.createElement('style');
  style.textContent = styles;
  document.head.appendChild(style);

  function getToken() {
    try { return sessionStorage.getItem(TOKEN_STORAGE) || ''; } catch { return ''; }
  }

  function clearTokenAndExit() {
    try { sessionStorage.removeItem(TOKEN_STORAGE); } catch {}
    window.location.href = LOGIN_ROOT;
  }

  async function apiJson(path, method = 'GET', body = null) {
    const token = getToken();
    if (!token) return clearTokenAndExit(), null;
    const headers = { authorization: 'Bearer ' + token };
    if (body !== null) headers['content-type'] = 'application/json';
    const res = await fetch(API_ROOT + path, {
      method,
      headers,
      body: body == null ? undefined : JSON.stringify(body),
    });
    if (res.status === 401) return clearTokenAndExit(), null;
    const text = await res.text();
    let payload = null;
    try { payload = JSON.parse(text); } catch {}
    if (!res.ok) throw new Error((payload && payload.error && payload.error.message) || 'Request failed');
    return payload;
  }

  async function apiText(path) {
    const token = getToken();
    if (!token) return clearTokenAndExit(), '';
    const res = await fetch(API_ROOT + path, {
      method: 'GET',
      headers: { authorization: 'Bearer ' + token },
    });
    if (res.status === 401) return clearTokenAndExit(), '';
    if (!res.ok) throw new Error('Request failed');
    return await res.text();
  }

  async function putYaml(path, yamlText) {
    const token = getToken();
    if (!token) return clearTokenAndExit();
    const res = await fetch(API_ROOT + path, {
      method: 'PUT',
      headers: {
        authorization: 'Bearer ' + token,
        'content-type': 'text/yaml',
      },
      body: yamlText,
    });
    if (res.status === 401) return clearTokenAndExit();
    const text = await res.text();
    let payload = null;
    try { payload = JSON.parse(text); } catch {}
    if (!res.ok) throw new Error((payload && payload.error && payload.error.message) || 'Save failed');
    return payload;
  }

  function parseTopLevelYamlValue(yamlText, key) {
    const m = String(yamlText || '').match(new RegExp('^' + key + ':\\s*(.+)$', 'm'));
    if (!m) return '';
    const raw = String(m[1] || '').trim();
    if (!raw || raw.toLowerCase() === 'null') return '';
    if ((raw.startsWith('"') && raw.endsWith('"')) || (raw.startsWith("'") && raw.endsWith("'"))) return raw.slice(1, -1);
    return raw;
  }

  function setTopLevelYamlValue(yamlText, key, value, nullable) {
    const text = String(yamlText || '');
    const v = String(value || '').trim();
    const encoded = !v && nullable ? 'null' : ('"' + v.replace(/"/g, '\\"') + '"');
    const line = key + ': ' + encoded;
    if (new RegExp('^' + key + ':\\s*', 'm').test(text)) {
      return text.replace(new RegExp('^' + key + ':\\s*.*$', 'm'), line);
    }
    return line + '\n' + text;
  }

  function headersObjToText(obj) {
    if (!obj || typeof obj !== 'object') return '';
    return Object.entries(obj).map(([k, v]) => String(k) + ': ' + String(v == null ? '' : v)).join('\n');
  }

  function headersTextToObj(text) {
    const out = {};
    String(text || '').split(/\r?\n/).forEach((line) => {
      const s = line.trim();
      if (!s) return;
      const idx = s.indexOf(':');
      if (idx <= 0) return;
      const key = s.slice(0, idx).trim();
      const val = s.slice(idx + 1).trim();
      if (!key) return;
      out[key] = val;
    });
    return out;
  }

  function readBody(type, text) {
    if (type === 'none') return { type: 'none' };
    if (type === 'raw') return { type: 'raw', raw: String(text || '') };
    const trimmed = String(text || '').trim();
    if (!trimmed) return { type: 'json', value: {} };
    try {
      return { type: 'json', value: JSON.parse(trimmed) };
    } catch {
      throw new Error('Token request body JSON is invalid.');
    }
  }

  function slotLabel(slot, alias) {
    const fallback = slot === 'secret2' ? 'Secret2' : 'Secret1';
    const named = String(alias || '').trim();
    return named || fallback;
  }

  function App() {
    const [view, setView] = React.useState('general');
    const [status, setStatus] = React.useState({ version: '', build: '', debug: false, enrichments: [] });
    const [yamlText, setYamlText] = React.useState('');
    const [proxyName, setProxyName] = React.useState('');
    const [targetHost, setTargetHost] = React.useState('');
    const [strategy, setStrategy] = React.useState('none');
    const [reqMethod, setReqMethod] = React.useState('POST');
    const [reqUrl, setReqUrl] = React.useState('');
    const [reqHeaders, setReqHeaders] = React.useState('');
    const [reqBodyType, setReqBodyType] = React.useState('json');
    const [reqBody, setReqBody] = React.useState('{}');
    const [authType, setAuthType] = React.useState('none');
    const [authHeaderName, setAuthHeaderName] = React.useState('Authorization');
    const [authSecretRef, setAuthSecretRef] = React.useState('secret1');
    const [keyPath, setKeyPath] = React.useState('data.apiKey');
    const [ttlPath, setTtlPath] = React.useState('data.ttl');
    const [ttlUnit, setTtlUnit] = React.useState('seconds');
    const [expiresAtPath, setExpiresAtPath] = React.useState('');
    const [refreshSkew, setRefreshSkew] = React.useState('300');
    const [retry401, setRetry401] = React.useState(true);
    const [saving, setSaving] = React.useState(false);
    const [error, setError] = React.useState('');
    const [ok, setOk] = React.useState('');
    const [secretStatus, setSecretStatus] = React.useState({ secret1: false, secret2: false });
    const [secretNames, setSecretNames] = React.useState({ secret1: '', secret2: '' });
    const [openSecretSlot, setOpenSecretSlot] = React.useState(null);
    const [secretDraftValue, setSecretDraftValue] = React.useState('');
    const [secretDraftName, setSecretDraftName] = React.useState('');
    const [secretDraftShow, setSecretDraftShow] = React.useState(false);
    const [secretBusy, setSecretBusy] = React.useState(false);
    const availableSecretRefs = ['secret1', 'secret2'].filter((slot) => !!secretStatus[slot]);

    React.useEffect(() => {
      if (strategy !== 'static') return;
      if (availableSecretRefs.includes(authSecretRef)) return;
      setAuthSecretRef(availableSecretRefs[0] || '');
    }, [strategy, authSecretRef, availableSecretRefs.join('|')]);

    React.useEffect(() => {
      if (!getToken()) return clearTokenAndExit();
      async function loadTargetSecretState() {
        const [namePayload, s1, s2] = await Promise.all([
          apiJson('/http-auth/target/secret-names', 'GET'),
          apiJson('/http-auth/target/secrets/secret1', 'GET'),
          apiJson('/http-auth/target/secrets/secret2', 'GET'),
        ]);
        const names = namePayload?.data?.secret_names || {};
        setSecretNames({
          secret1: String(names.secret1 || ''),
          secret2: String(names.secret2 || ''),
        });
        setSecretStatus({
          secret1: !!s1?.data?.secret_set,
          secret2: !!s2?.data?.secret_set,
        });
      }

      (async () => {
        try {
          const [versionRes, debugRes, headersRes, cfgYaml, keyRotation] = await Promise.all([
            apiJson('/version'),
            apiJson('/debug'),
            apiJson('/headers'),
            apiText('/config'),
            apiJson('/key-rotation-config'),
          ]);
          if (!versionRes || !keyRotation) return;
          setYamlText(cfgYaml || '');
          setProxyName(parseTopLevelYamlValue(cfgYaml, 'proxyName'));
          setTargetHost(parseTopLevelYamlValue(cfgYaml, 'targetHost'));
          setStatus({
            version: String(versionRes?.data?.version || ''),
            build: String(versionRes?.data?.build_timestamp || ''),
            debug: !!debugRes?.data?.enabled,
            enrichments: Array.isArray(headersRes?.enriched_headers) ? headersRes.enriched_headers : [],
          });
          const d = keyRotation.data || {};
          const req = d.request || {};
          const enabled = !!d.enabled;
          const reqAuthType = String(req?.authorization?.type || '').trim();
          if (!enabled) setStrategy('none');
          else if (reqAuthType === 'static') setStrategy('static');
          else setStrategy('advanced');

          setReqMethod(String(req.method || 'POST').toUpperCase());
          setReqUrl(String(req.url || ''));
          setReqHeaders(headersObjToText(req.headers || {}));
          if (req.body && req.body.type === 'raw') {
            setReqBodyType('raw');
            setReqBody(String(req.body.raw || ''));
          } else if (req.body && req.body.type === 'none') {
            setReqBodyType('none');
            setReqBody('');
          } else {
            setReqBodyType('json');
            setReqBody(JSON.stringify((req.body && req.body.value) || {}, null, 2));
          }
          setAuthType(reqAuthType || 'none');
          setAuthHeaderName(String(req?.authorization?.header_name || 'Authorization'));
          setAuthSecretRef(String(req?.authorization?.secret_ref || 'secret1'));
          setKeyPath(String(d.key_path || 'data.apiKey'));
          setTtlPath(d.ttl_path == null ? '' : String(d.ttl_path));
          setTtlUnit(String(d.ttl_unit || 'seconds'));
          setExpiresAtPath(d.expires_at_path == null ? '' : String(d.expires_at_path));
          setRefreshSkew(String(Number(d.refresh_skew_seconds || 0)));
          setRetry401(!!d.retry_once_on_401);
          await loadTargetSecretState();
        } catch (err) {
          setError(String(err && err.message || err));
        }
      })();
    }, []);

    function openSecretEditor(slot) {
      setOpenSecretSlot(slot);
      setSecretDraftValue('');
      setSecretDraftShow(false);
      setSecretDraftName(String(secretNames?.[slot] || ''));
      setOk('');
      setError('');
    }

    function closeSecretEditor() {
      setOpenSecretSlot(null);
      setSecretDraftValue('');
      setSecretDraftName('');
      setSecretDraftShow(false);
    }

    async function refreshTargetSecrets() {
      const [namePayload, s1, s2] = await Promise.all([
        apiJson('/http-auth/target/secret-names', 'GET'),
        apiJson('/http-auth/target/secrets/secret1', 'GET'),
        apiJson('/http-auth/target/secrets/secret2', 'GET'),
      ]);
      const names = namePayload?.data?.secret_names || {};
      setSecretNames({
        secret1: String(names.secret1 || ''),
        secret2: String(names.secret2 || ''),
      });
      setSecretStatus({
        secret1: !!s1?.data?.secret_set,
        secret2: !!s2?.data?.secret_set,
      });
    }

    async function saveSecretSlot(slot) {
      setSecretBusy(true);
      setOk('');
      setError('');
      try {
        const payload = {
          secret1_name: slot === 'secret1' ? String(secretDraftName || '') : undefined,
          secret2_name: slot === 'secret2' ? String(secretDraftName || '') : undefined,
        };
        await apiJson('/http-auth/target/secret-names', 'PUT', payload);
        const val = String(secretDraftValue || '').trim();
        if (val) {
          await apiJson('/http-auth/target/secrets/' + encodeURIComponent(slot), 'PUT', { value: val });
        }
        await refreshTargetSecrets();
        setOk(val ? 'Secret saved.' : 'Secret name saved.');
        closeSecretEditor();
      } catch (err) {
        setError(String(err && err.message || err));
      } finally {
        setSecretBusy(false);
      }
    }

    async function removeSecretSlot(slot) {
      setSecretBusy(true);
      setOk('');
      setError('');
      try {
        await apiJson('/http-auth/target/secrets/' + encodeURIComponent(slot), 'DELETE');
        await refreshTargetSecrets();
        setOk('Secret removed.');
        closeSecretEditor();
      } catch (err) {
        setError(String(err && err.message || err));
      } finally {
        setSecretBusy(false);
      }
    }

    function renderOverviewStatus() {
      return e('div', { className: 'ra-grid' },
        e('div', { className: 'ra-card' },
          e('div', { className: 'ra-pill' }, 'Status'),
          e('div', null, e('b', null, 'Proxy Name:'), ' ', proxyName || 'n/a'),
          e('div', null, e('b', null, 'Debug Enabled:'), ' ', status.debug ? 'yes' : 'no'),
          e('div', null, e('b', null, 'Target URL:'), ' ', targetHost || 'n/a'),
          e('div', null, e('b', null, 'Enrichments:'), ' ', (status.enrichments && status.enrichments.length) ? status.enrichments.join(', ') : 'n/a')
        ),
        e('div', { className: 'ra-card' },
          e('div', { className: 'ra-pill' }, 'Build'),
          e('div', null, e('b', null, 'Version:'), ' ', status.version || 'unknown'),
          e('div', null, e('b', null, 'Build Timestamp:'), ' ', status.build || 'n/a')
        )
      );
    }

    async function saveGeneral() {
      setSaving(true);
      setError('');
      setOk('');
      try {
        let nextYaml = String(yamlText || '');
        nextYaml = setTopLevelYamlValue(nextYaml, 'proxyName', proxyName, true);
        nextYaml = setTopLevelYamlValue(nextYaml, 'targetHost', targetHost, false);
        await putYaml('/config', nextYaml);
        setYamlText(nextYaml);

        const request = {
          method: String(reqMethod || 'POST').toUpperCase(),
          url: String(reqUrl || '').trim(),
          headers: headersTextToObj(reqHeaders),
          body: readBody(reqBodyType, reqBody),
        };
        if (strategy === 'none') {
          request.authorization = { type: 'none' };
        } else if (strategy === 'static') {
          const chosenRef = String(authSecretRef || '').trim();
          if (!chosenRef) throw new Error('Set at least one secret slot, then select it for static auth.');
          request.authorization = {
            type: 'static',
            header_name: String(authHeaderName || 'Authorization').trim() || 'Authorization',
            secret_ref: chosenRef,
          };
        } else {
          request.authorization = { type: String(authType || 'oauth_client_credentials') };
        }

        const payload = {
          enabled: strategy !== 'none',
          strategy: strategy === 'advanced' ? 'oauth_client_credentials' : 'json_ttl',
          request,
          key_path: String(keyPath || '').trim(),
          ttl_path: String(ttlPath || '').trim() || null,
          ttl_unit: String(ttlUnit || 'seconds'),
          expires_at_path: String(expiresAtPath || '').trim() || null,
          refresh_skew_seconds: Number(refreshSkew || 0),
          retry_once_on_401: !!retry401,
        };
        await apiJson('/key-rotation-config', 'PUT', payload);
        setOk('General saved.');
      } catch (err) {
        setError(String(err && err.message || err));
      } finally {
        setSaving(false);
      }
    }

    const nav = e('div', { className: 'ra-nav' },
      e('button', { className: view === 'general' ? 'active' : '', onClick: () => setView('general') }, 'General'),
      e('button', { className: view === 'config' ? 'active' : '', onClick: () => setView('config') }, 'YAML Configuration'),
      e('button', { className: view === 'keys' ? 'active' : '', onClick: () => setView('keys') }, 'API Keys'),
      e('button', { onClick: clearTokenAndExit }, 'Logout')
    );

    const generalView = e('div', {},
      e('h1', { className: 'ra-title' }, 'General'),
      e('p', { className: 'ra-sub' }, 'React migration of legacy General tab.'),
      renderOverviewStatus(),
      e('div', { className: 'ra-card' },
        e('label', { className: 'ra-field', htmlFor: 'ra-proxy-name' }, 'Proxy name'),
        e('input', { id: 'ra-proxy-name', className: 'ra-input', value: proxyName, onChange: (ev) => setProxyName(ev.target.value), placeholder: 'friendly name' }),
        e('label', { className: 'ra-field', htmlFor: 'ra-target-host' }, 'Target URL'),
        e('input', { id: 'ra-target-host', className: 'ra-input', value: targetHost, onChange: (ev) => setTargetHost(ev.target.value), placeholder: 'https://api.example.com' }),
        e('hr', { className: 'ra-hr' }),
        e('p', { style: { margin: '0 0 8px 0', fontSize: '18px', fontWeight: 700 } }, 'Target Auth'),
        e('label', { className: 'ra-field', htmlFor: 'ra-strategy' }, 'Authentication Type'),
        e('select', { id: 'ra-strategy', className: 'ra-select', value: strategy, onChange: (ev) => setStrategy(ev.target.value) },
          e('option', { value: 'none' }, 'None'),
          e('option', { value: 'static' }, 'Static'),
          e('option', { value: 'advanced' }, 'Advanced (OAuth/Rotation)')
        ),
        strategy !== 'none' ? e('div', {},
          e('p', { style: { margin: '12px 0 6px', fontWeight: 700 } }, 'Authentication secrets'),
          e('div', { className: 'ra-secret-list' },
            ['secret1', 'secret2'].map((slot) => {
              const isSet = !!secretStatus[slot];
              const isOpen = openSecretSlot === slot;
              return e('div', {
                key: slot,
                className: 'ra-secret-chip ' + (isSet ? 'set' : 'unset'),
              },
              e('div', { className: 'ra-secret-chip-head' },
                e('div', { className: 'ra-secret-chip-title' }, slotLabel(slot, secretNames[slot])),
                e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
                  e('span', { className: 'ra-secret-chip-status ' + (isSet ? 'set' : 'unset') }, isSet ? 'Set' : 'Empty'),
                  e('button', {
                    type: 'button',
                    className: 'ra-link-btn',
                    onClick: () => isOpen ? closeSecretEditor() : openSecretEditor(slot),
                  }, isOpen ? 'Close' : (isSet ? 'Update' : 'Add'))
                )
              ),
              e('div', { className: 'ra-secret-chip-note' }, 'Access this secret in configuration using ${' + slot + '}'),
              isOpen ? e('div', { className: 'ra-secret-drawer' },
                e('label', { className: 'ra-field', htmlFor: 'ra-secret-name-' + slot }, 'Friendly name'),
                e('input', {
                  id: 'ra-secret-name-' + slot,
                  className: 'ra-input',
                  value: secretDraftName,
                  onChange: (ev) => setSecretDraftName(ev.target.value),
                  placeholder: slot === 'secret1' ? 'e.g. Production API token' : 'e.g. Backup API token',
                }),
                e('label', { className: 'ra-field', htmlFor: 'ra-secret-value-' + slot }, 'Secret value'),
                e('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } },
                  e('input', {
                    id: 'ra-secret-value-' + slot,
                    className: 'ra-input',
                    type: secretDraftShow ? 'text' : 'password',
                    value: secretDraftValue,
                    onChange: (ev) => setSecretDraftValue(ev.target.value),
                    placeholder: isSet ? 'Leave blank to keep current secret' : 'Enter secret',
                  }),
                  e('button', {
                    type: 'button',
                    className: 'ra-btn',
                    onClick: () => setSecretDraftShow(!secretDraftShow),
                  }, secretDraftShow ? 'Hide' : 'Show')
                ),
                e('div', { className: 'ra-dim', style: { marginTop: '6px' } }, 'Secrets are write-only and cannot be read back.'),
                e('div', { className: 'ra-secret-actions' },
                  e('button', {
                    type: 'button',
                    className: 'ra-btn primary',
                    onClick: () => saveSecretSlot(slot),
                    disabled: secretBusy,
                  }, secretBusy ? 'Saving...' : 'Save Secret'),
                  isSet ? e('button', {
                    type: 'button',
                    className: 'ra-btn danger',
                    onClick: () => removeSecretSlot(slot),
                    disabled: secretBusy,
                  }, 'Remove') : null,
                  e('button', {
                    type: 'button',
                    className: 'ra-link-btn',
                    onClick: closeSecretEditor,
                  }, 'Cancel')
                )
              ) : null
              );
            })
          ),
          e('p', { style: { margin: '12px 0 6px', fontWeight: 700 } }, 'Token Request'),
          e('div', { className: 'ra-row' },
            e('label', { className: 'ra-field', htmlFor: 'ra-req-method' }, 'Method'),
            e('select', { id: 'ra-req-method', className: 'ra-select', value: reqMethod, onChange: (ev) => setReqMethod(ev.target.value) },
              e('option', { value: 'GET' }, 'GET'),
              e('option', { value: 'POST' }, 'POST'),
              e('option', { value: 'PUT' }, 'PUT'),
              e('option', { value: 'PATCH' }, 'PATCH')
            )
          ),
          e('label', { className: 'ra-field', htmlFor: 'ra-req-url' }, 'URL'),
          e('input', { id: 'ra-req-url', className: 'ra-input', value: reqUrl, onChange: (ev) => setReqUrl(ev.target.value), placeholder: 'https://...' }),
          e('label', { className: 'ra-field', htmlFor: 'ra-req-headers' }, 'Headers'),
          e('textarea', { id: 'ra-req-headers', className: 'ra-textarea', value: reqHeaders, onChange: (ev) => setReqHeaders(ev.target.value), placeholder: 'Header-Name: value' }),
          e('label', { className: 'ra-field', htmlFor: 'ra-req-body-type' }, 'Request Body Type'),
          e('select', { id: 'ra-req-body-type', className: 'ra-select', value: reqBodyType, onChange: (ev) => setReqBodyType(ev.target.value) },
            e('option', { value: 'json' }, 'json'),
            e('option', { value: 'raw' }, 'raw'),
            e('option', { value: 'none' }, 'none')
          ),
          reqBodyType !== 'none' ? e('div', {},
            e('label', { className: 'ra-field', htmlFor: 'ra-req-body' }, 'Request Body'),
            e('textarea', { id: 'ra-req-body', className: 'ra-textarea', value: reqBody, onChange: (ev) => setReqBody(ev.target.value), placeholder: reqBodyType === 'json' ? '{}' : '' })
          ) : null,
          strategy === 'static' ? e('div', {},
            e('label', { className: 'ra-field', htmlFor: 'ra-auth-header-name' }, 'Auth header name'),
            e('input', { id: 'ra-auth-header-name', className: 'ra-input', value: authHeaderName, onChange: (ev) => setAuthHeaderName(ev.target.value), placeholder: 'Authorization' }),
            e('label', { className: 'ra-field', htmlFor: 'ra-auth-secret-ref' }, 'Select secret slot'),
            e('select', { id: 'ra-auth-secret-ref', className: 'ra-select', value: authSecretRef, onChange: (ev) => setAuthSecretRef(ev.target.value) },
              availableSecretRefs.length
                ? availableSecretRefs.map((slot) => e('option', { key: slot, value: slot }, slotLabel(slot, secretNames[slot])))
                : e('option', { value: '' }, 'No saved secret slots')
            )
          ) : null,
          strategy === 'advanced' ? e('div', {},
            e('label', { className: 'ra-field', htmlFor: 'ra-auth-type' }, 'Auth Type'),
            e('select', { id: 'ra-auth-type', className: 'ra-select', value: authType, onChange: (ev) => setAuthType(ev.target.value) },
              e('option', { value: 'oauth_client_credentials' }, 'OAuth'),
              e('option', { value: 'json_ttl' }, 'Generic TTL Rotation'),
              e('option', { value: 'none' }, 'none'),
              e('option', { value: 'static' }, 'static')
            ),
            e('p', { style: { margin: '12px 0 6px', fontWeight: 700 } }, 'Token Response'),
            e('label', { className: 'ra-field', htmlFor: 'ra-key-path' }, 'Response Key Path'),
            e('input', { id: 'ra-key-path', className: 'ra-input', value: keyPath, onChange: (ev) => setKeyPath(ev.target.value), placeholder: 'data.apiKey' }),
            e('label', { className: 'ra-field', htmlFor: 'ra-ttl-path' }, 'Response TTL Path'),
            e('input', { id: 'ra-ttl-path', className: 'ra-input', value: ttlPath, onChange: (ev) => setTtlPath(ev.target.value), placeholder: 'data.ttl' }),
            e('label', { className: 'ra-field', htmlFor: 'ra-ttl-unit' }, 'Response TTL Unit'),
            e('select', { id: 'ra-ttl-unit', className: 'ra-select', value: ttlUnit, onChange: (ev) => setTtlUnit(ev.target.value) },
              e('option', { value: 'seconds' }, 'seconds'),
              e('option', { value: 'minutes' }, 'minutes'),
              e('option', { value: 'hours' }, 'hours')
            ),
            e('label', { className: 'ra-field', htmlFor: 'ra-expires-at-path' }, 'Response Expires-At Path'),
            e('input', { id: 'ra-expires-at-path', className: 'ra-input', value: expiresAtPath, onChange: (ev) => setExpiresAtPath(ev.target.value), placeholder: 'data.expiresAt' }),
            e('label', { className: 'ra-field', htmlFor: 'ra-refresh-skew' }, 'Refresh Skew Seconds'),
            e('input', { id: 'ra-refresh-skew', className: 'ra-input', value: refreshSkew, onChange: (ev) => setRefreshSkew(ev.target.value), type: 'number', min: '0' }),
            e('label', { style: { display: 'flex', gap: '8px', alignItems: 'center', margin: '12px 0 0' } },
              e('input', { type: 'checkbox', checked: retry401, onChange: (ev) => setRetry401(!!ev.target.checked) }),
              e('span', null, 'Retry Once On 401')
            )
          ) : null
        ) : null,
        e('div', { style: { marginTop: '14px', borderTop: '1px solid #e2e8f0', paddingTop: '10px', display: 'flex', gap: '8px' } },
          e('button', { className: 'ra-btn primary', onClick: saveGeneral, disabled: saving }, saving ? 'Saving...' : 'Save')
        ),
        ok ? e('div', { className: 'ra-ok', style: { marginTop: '8px' } }, ok) : null
      )
    );

    const configView = e('div', {},
      e('h1', { className: 'ra-title' }, 'YAML Configuration'),
      e('p', { className: 'ra-sub' }, 'Migration pending.')
    );

    const keysView = e('div', {},
      e('h1', { className: 'ra-title' }, 'API Keys'),
      e('p', { className: 'ra-sub' }, 'Migration pending.')
    );

    return e('div', { className: 'ra-shell' },
      e('aside', { className: 'ra-side' },
        e('div', { className: 'ra-brand' }, 'SimpleProxy', e('br'), 'Admin React'),
        e('div', { className: 'ra-note' }, 'Control worker scoped'),
        nav
      ),
      e('main', { className: 'ra-main' },
        error ? e('div', { className: 'ra-card' }, e('div', { className: 'ra-err' }, error)) : null,
        view === 'general' ? generalView : null,
        view === 'config' ? configView : null,
        view === 'keys' ? keysView : null
      )
    );
  }

  ReactDOM.createRoot(document.getElementById('react-admin-root')).render(e(App));
})();
</script>
