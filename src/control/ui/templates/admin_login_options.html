<div style="padding:12px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;">
  <p style="margin:0 0 6px 0;"><b>Admin Login</b></p>
  <p style="margin:0 0 8px 0;color:#475569;">Enter your admin key to open the console.</p>
  <input id="init-admin-key" type="password" placeholder="Enter admin key"
    style="width:100%;max-width:560px;padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;" />
  <div style="margin-top:6px;font-size:12px;color:#475569;">Admin key is not stored in browser local storage.</div>
  <div style="margin-top:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button type="button" onclick="initAdminLogin()"
      style="padding:8px 12px;border:1px solid #0f172a;border-radius:8px;background:#111827;color:#fff;cursor:pointer;">Open Admin Console</button>
    <a href="{{docs_url}}" target="_blank" rel="noopener noreferrer" style="font-size:13px;">Use API instead</a>
  </div>
  <div id="init-admin-login-msg" style="margin-top:8px;color:#991b1b;"></div>
</div>
